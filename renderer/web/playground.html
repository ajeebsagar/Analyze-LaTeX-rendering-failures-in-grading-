<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LaTeX Renderer — Live Playground</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<style>
  body{font-family:system-ui,sans-serif;max-width:980px;margin:24px auto;padding:0 16px;line-height:1.5;color:#222}
  h1{margin-bottom:6px} .sub{color:#666;margin-top:0}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
  textarea{width:100%;height:200px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;
           padding:10px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box}
  .preview{padding:12px;border:1px solid #ddd;border-radius:6px;background:#fafafa;min-height:200px}
  .meta{font-size:12px;color:#666;margin-bottom:8px}
  .latex-fallback{background:#fff3cd;color:#7a5b00;padding:0 2px;border-radius:3px;font-family:monospace}
  button{padding:8px 12px;border:1px solid #bbb;border-radius:6px;background:#fff;cursor:pointer}
  button:hover{background:#f0f0f0}
  .samples{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
  .samples button{font-size:12px}
  pre.prepared{font-size:12px;color:#456;background:#eef;padding:8px;border-radius:6px;overflow:auto}
  label{font-size:13px;color:#444}
  .row{margin:6px 0}
</style>
</head>
<body>
<h1>LaTeX Renderer — Live Playground</h1>
<p class="sub">Edit the input on the left; the right pane runs the JS port of the
preparation pipeline and renders the result with KaTeX.</p>

<div class="row">
  <label>source family:</label>
  <select id="family">
    <option value="unknown">unknown (default)</option>
    <option value="rubric_criterion">rubric_criterion (math-only field)</option>
    <option value="review_working_line">review_working_line (OCR student work)</option>
    <option value="ai_solution">ai_solution (LLM prose)</option>
    <option value="student_answer">student_answer (low trust)</option>
    <option value="authored_question">authored_question</option>
    <option value="feedback">feedback</option>
  </select>
</div>

<div class="samples">
  <button data-s="If $\alpha$ and $\beta$ are zeroes of $x^2 - 1$, find $\alpha+\beta$.">clean inline</button>
  <button data-s="\alpha + \beta = -\frac{1}{6}, \alpha\beta = -\frac{1}{3}">rubric: missing delim</button>
  <button data-s="$\alpha + eta + \alpha\beta$">orphan: \beta -&gt; eta</button>
  <button data-s="$\frac{1}{3} \times rac{2}{5}$">orphan: \frac -&gt; rac</button>
  <button data-s="Step 1: do thing.\nStep 2: do other.">literal \n</button>
  <button data-s="The most electronegative element is ______">fill-in-the-blank</button>
  <button data-s="The book costs $5">currency false positive</button>
  <button data-s="... $0.1\,\mathrm{M}$ and $0.5\,\mathrm{M}$. [Ka for $...">truncation</button>
  <button data-s="$$f(x) = \begin{cases} x^2, & 0 \leq x \leq 3 \\ 9x, & 3 \leq x \leq 10 \end{cases}$$">cases env</button>
  <button data-s="$\input{/etc/passwd}$">forbidden command</button>
</div>

<div class="grid">
  <div>
    <div class="meta">Raw input</div>
    <textarea id="input">If $\alpha$ and $\beta$ are zeroes of $x^2 - 1$, find $\alpha + \beta$.</textarea>
    <div class="meta" style="margin-top:8px">Prepared (pre-KaTeX)</div>
    <pre class="prepared" id="prepared"></pre>
    <div class="meta">Repairs applied: <span id="repairs"></span></div>
  </div>
  <div>
    <div class="meta">Rendered output</div>
    <div class="preview" id="output"></div>
  </div>
</div>

<script src="renderer.js"></script>
<script>
  function run() {
    var text = document.getElementById('input').value;
    var fam  = document.getElementById('family').value;
    var res  = window.LatexRenderer.prepare(text, { sourceFamily: fam });
    document.getElementById('prepared').textContent = res.preparedText;
    document.getElementById('repairs').textContent  = res.repairs.length ? res.repairs.join(', ') : '(none)';
    var out = document.getElementById('output');
    out.innerHTML = res.html;
    if (window.renderMathInElement) {
      window.renderMathInElement(out, {
        delimiters:[
          {left:'$$',right:'$$',display:true},
          {left:'$', right:'$', display:false},
          {left:'\\[',right:'\\]',display:true},
          {left:'\\(',right:'\\)',display:false}
        ],
        throwOnError:false, strict:'ignore'
      });
    }
  }
  document.getElementById('input').addEventListener('input', run);
  document.getElementById('family').addEventListener('change', run);
  document.querySelectorAll('.samples button').forEach(function(b){
    b.addEventListener('click', function(){
      document.getElementById('input').value = b.getAttribute('data-s');
      run();
    });
  });
  window.addEventListener('load', function(){ setTimeout(run, 50); });
</script>
</body>
</html>
